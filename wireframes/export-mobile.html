<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Export Mobile Wireframe</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: white; font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: flex-start; padding: 20px; }
        .container { width: 375px; border: 3px solid #333; background: white; display: flex; flex-direction: column; }
        .header { background: linear-gradient(135deg, #e8d4f0 0%, #d4c9e8 100%); height: 100px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 16px; color: #333; border-bottom: 2px solid #999; text-align: center; padding: 10px; }
        .nav { background: linear-gradient(135deg, #f0e8d4 0%, #e8dcc4 100%); height: 40px; display: flex; align-items: center; padding: 0 10px; font-weight: bold; font-size: 11px; color: #333; border-bottom: 2px solid #999; }
        .card { background: linear-gradient(135deg, #d4e8f0 0%, #c9dce8 100%); border: 2px dashed #999; border-radius: 6px; margin: 8px; padding: 15px; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #333; font-weight: bold; text-align: center; min-height: 80px; }
        .footer { background: linear-gradient(135deg, #e8d4f0 0%, #d4c9e8 100%); height: 60px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 13px; color: #333; border-top: 2px solid #999; margin-top: auto; }
        p { margin: 3px; font-size: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <p><strong>HEADER</strong></p>
                <p>Style Stage Hero</p>
            </div>
        </div>
        <div class="nav">
            NAVIGATION
        </div>
        <div class="card">
            <div>
                <p><strong>SECTION 1</strong></p>
                <p>Glass Card (Full Width)</p>
            </div>
        </div>
        <div class="card">
            <div>
                <p><strong>SECTION 2</strong></p>
                <p>Glass Card (Full Width)</p>
            </div>
        </div>
        <div class="card">
            <div>
                <p><strong>SECTION 3</strong></p>
                <p>Glass Card (Full Width)</p>
            </div>
        </div>
        <div class="card">
            <div>
                <p><strong>SECTION 4</strong></p>
                <p>Glass Card (Full Width)</p>
            </div>
        </div>
        <div class="footer">
            FOOTER
        </div>
    </div>
</body>
</html>
